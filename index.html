<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Trip 2026</title>
    <!-- 使用 Tailwind CSS 快速建構美觀的手機版網頁 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂機票樣式與動畫 */
        body {
            background-color: #f0f4f8; /* 換成清爽的淺藍灰背景色 */
            font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Heiti TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ticket-cutout {
            position: relative;
        }
        /* 機票兩側的半圓形凹槽 */
        .ticket-cutout::before, .ticket-cutout::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background-color: #f0f4f8; /* 配合背景色 */
            border-radius: 50%;
            transform: translateY(-50%);
        }
        .ticket-cutout::before { left: -10px; }
        .ticket-cutout::after { right: -10px; }
        
        .barcode {
            font-family: 'Libre Barcode 39', cursive, monospace; /* 模擬條碼視覺 */
            font-size: 2rem;
            letter-spacing: 2px;
            color: #333;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 隱藏 Tab 捲軸的樣式 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- 頂部機票 Header -->
    <header class="max-w-md mx-auto mt-4 px-4">
        <div class="bg-white rounded-xl shadow-md overflow-hidden border-t-8 border-blue-600">
            <div class="p-4 flex justify-between items-center border-b-2 border-dashed border-gray-200">
                <div>
                    <p class="text-xs text-gray-500 uppercase font-bold">Passenger</p>
                    <p class="text-lg font-bold text-gray-800">PoPo 💖 LaaLaa</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500 uppercase font-bold">Flight</p>
                    <p class="text-lg font-bold text-blue-600">JP-2026</p>
                </div>
            </div>
            <div class="p-4 bg-gray-50 flex justify-between items-center">
                <div class="text-center">
                    <p class="text-3xl font-black text-gray-800">HKG</p>
                    <p class="text-xs text-gray-500">Hong Kong</p>
                </div>
                <div class="flex-1 px-4 flex flex-col items-center">
                    <span class="text-2xl">✈️</span>
                    <div class="w-full h-0.5 bg-gray-300 rounded mt-1"></div>
                </div>
                <!-- 目的地 加入 ID 方便控制模糊效果 -->
                <div class="text-center transition-all duration-1000" id="flight-dest">
                    <p class="text-3xl font-black text-gray-800">NRT</p>
                    <p class="text-xs text-gray-500">Tokyo</p>
                </div>
            </div>
        </div>
    </header>

    <!-- 任務列表區塊 -->
    <main class="max-w-md mx-auto mt-6 px-4">
        <!-- 日期切換 Tabs -->
        <div id="tabs-container" class="mb-2"></div>
        
        <!-- 任務卡片區塊 -->
        <div id="task-container" class="space-y-6"></div>
    </main>

    <!-- 測試模式工具 (右下角懸浮) -->
    <div id="test-mode-container" class="fixed bottom-4 right-4 z-50">
        <button id="test-mode-btn" class="bg-gray-800 text-white p-3 rounded-full shadow-lg text-sm font-bold opacity-80 hover:opacity-100">
            🛠️ 測試時間
        </button>
    </div>

    <!-- 測試模式彈出視窗 -->
    <div id="test-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg w-80 shadow-xl">
            <h3 class="text-lg font-bold mb-4">開發者測試模式</h3>
            <p class="text-xs text-gray-500 mb-2">模擬而家嘅手機時間，方便測試每日任務狀態。</p>
            <input type="datetime-local" id="mock-time-input" class="w-full border p-2 rounded mb-4 text-sm">
            <div class="flex justify-end space-x-2">
                <button id="reset-time-btn" class="px-3 py-1 bg-gray-200 rounded text-sm font-bold">重置時間</button>
                <button id="close-test-btn" class="px-3 py-1 bg-blue-600 text-white rounded text-sm font-bold">確定套用</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * --- 系統設定 ---
         */
        const ENABLE_TEST_MODE = true; 

        /**
         * 系統變數
         */
        let travelData = []; // 資料將從 questions.json 載入
        let mockDate = null; 
        let timerInterval = null;
        let currentTabIndex = 0; 
        let photoCache = {}; // 暫存在記憶體中的相片預覽

        // --- 初始化：載入資料 ---
        async function initApp() {
            try {
                // 加上 timestamp 避免瀏覽器快取
                const response = await fetch(`questions.json?t=${new Date().getTime()}`);
                travelData = await response.json();
                renderTasks();
                timerInterval = setInterval(updateCountdowns, 1000);
            } catch (error) {
                console.error("無法載入任務資料:", error);
                document.getElementById('task-container').innerHTML = '<p class="text-center text-red-500 mt-10 font-bold">載入資料失敗，請重新整理網頁。</p>';
            }
        }

        function switchTab(index) {
            currentTabIndex = index;
            renderTasks();
        }

        function getCurrentTime() {
            return mockDate ? new Date(mockDate) : new Date();
        }

        // 檢查文字答案
        function checkTextAnswer(taskId, correctAnswer) {
            const inputEl = document.getElementById(`input_${taskId}`);
            const errorEl = document.getElementById(`error_${taskId}`);
            const userAnswer = inputEl.value.trim().toLowerCase(); 
            
            if (correctAnswer === "" || userAnswer === correctAnswer.trim().toLowerCase()) {
                markTaskCompleted(taskId);
            } else {
                errorEl.classList.remove('hidden');
                setTimeout(() => errorEl.classList.add('hidden'), 2000);
            }
        }

        // 處理按鈕任務
        function checkButtonTask(taskId) {
            markTaskCompleted(taskId);
        }

        // 處理相片上傳 (壓縮後預覽)
        function handlePhotoUpload(taskId, inputElement) {
            if (inputElement.files && inputElement.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    photoCache[taskId] = e.target.result;
                    markTaskCompleted(taskId);
                };
                reader.readAsDataURL(inputElement.files[0]);
            }
        }

        function markTaskCompleted(taskId) {
            localStorage.setItem(`completed_${taskId}`, "true");
            renderTasks();
        }

        // 計算倒數計時字串 (廣東話口語版)
        function getCountdownString(targetDate, now) {
            const diff = targetDate - now;
            if (diff <= 0) return "";
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            if (hours > 24) {
                const days = Math.floor(hours / 24);
                return `仲有 ${days} 日 ${hours % 24} 個鐘就解鎖啦`;
            }
            return `仲有 ${hours} 個鐘 ${minutes} 分鐘 ${seconds} 秒就解鎖啦`;
        }

        // 主渲染函數
        function renderTasks() {
            const tabsContainer = document.getElementById('tabs-container');
            const taskContainer = document.getElementById('task-container');
            const now = getCurrentTime();
            
            // 處理目的地解鎖 (以第一日第一個任務時間為整趟旅程開始)
            const TRIP_START_TIME = new Date(travelData[0].tasks[0].unlockTime);
            const destBlock = document.getElementById('flight-dest');
            if (now < TRIP_START_TIME) {
                destBlock.classList.add('blur-md', 'select-none', 'pointer-events-none');
            } else {
                destBlock.classList.remove('blur-md', 'select-none', 'pointer-events-none');
            }
            
            // 1. 渲染 Tabs
            let tabsHtml = '<div class="flex overflow-x-auto space-x-3 py-2 no-scrollbar snap-x">';
            travelData.forEach((day, index) => {
                const isActive = index === currentTabIndex;
                const shortDate = day.dateLabel.split(' - ')[0]; 
                tabsHtml += `
                    <button onclick="switchTab(${index})"
                            class="snap-start flex-shrink-0 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-colors border
                            ${isActive ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}">
                        ${shortDate}
                    </button>
                `;
            });
            tabsHtml += '</div>';
            tabsContainer.innerHTML = tabsHtml;

            // 2. 渲染當前選定日期的任務
            let html = '';
            const currentDay = travelData[currentTabIndex];
            const isDayLocked = now < new Date(currentDay.tasks[0].unlockTime);

            // 神秘化：如果該日行程未開始，模糊化行程標題
            const titleClass = isDayLocked ? "blur-md select-none transition-all duration-1000" : "transition-all duration-1000";
            html += `<h2 class="text-xl font-bold text-gray-800 ml-2 mt-4 mb-4 border-l-4 border-blue-600 pl-2">
                        <span class="${titleClass}">${currentDay.dateLabel}</span>
                     </h2>`;
            
            // 神秘化：過濾並隱藏任務數量 (只顯示已解鎖任務 + 1個未解鎖任務)
            let displayedTasks = [];
            let foundLocked = false;
            for (let task of currentDay.tasks) {
                const unlockTime = new Date(task.unlockTime);
                if (now < unlockTime) {
                    if (!foundLocked) {
                        displayedTasks.push(task); // 加入第一個未解鎖任務
                        foundLocked = true;
                    }
                } else {
                    displayedTasks.push(task); // 已解鎖任務
                }
            }
            
            displayedTasks.forEach(task => {
                const unlockTime = new Date(task.unlockTime);
                const autoCompleteTime = new Date(unlockTime.getTime() + 60 * 60 * 1000); 
                const isManualCompleted = localStorage.getItem(`completed_${task.id}`) === "true";
                
                const isLocked = now < unlockTime;
                const isAutoCompleted = now >= autoCompleteTime;
                const isCompleted = isManualCompleted || isAutoCompleted;

                const displayQuestion = task.question;

                if (isLocked) {
                    // 渲染隱藏的神秘任務卡片 (Backdrop Blur 效果)
                    html += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 ticket-cutout mb-4 relative overflow-hidden fade-in">
                            <!-- 神秘遮罩層 -->
                            <div class="absolute inset-0 bg-white/60 backdrop-blur-md z-10 flex flex-col items-center justify-center p-4 text-center">
                                <span class="text-4xl mb-2 animate-bounce">🔒</span>
                                <h3 class="text-lg font-black text-gray-800 tracking-widest mb-1 drop-shadow-sm">神秘任務</h3>
                                <span class="text-sm font-bold text-blue-700 countdown-text bg-white/80 px-3 py-1 rounded-full shadow-sm mt-2" data-target="${task.unlockTime}">
                                    ${getCountdownString(unlockTime, now)}
                                </span>
                            </div>
                            <!-- 假內容 (被 blur 遮住的骨架) -->
                            <div class="opacity-30 blur-sm pointer-events-none select-none" aria-hidden="true">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-xs font-bold px-2 py-1 bg-gray-100 text-gray-600 rounded">🕒 ??:??</span>
                                    <span class="text-xs font-bold text-gray-400">🔒 未解鎖</span>
                                </div>
                                <h3 class="text-md font-bold text-gray-800 mb-2">??????????????????????????</h3>
                                <div class="mt-3 space-y-2">
                                    <div class="w-full h-12 bg-gray-200 rounded-lg"></div>
                                    <div class="w-full h-12 bg-blue-200 rounded-lg"></div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // 正常渲染已解鎖的任務
                    html += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 ticket-cutout mb-4 fade-in">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs font-bold px-2 py-1 bg-gray-100 text-gray-600 rounded">
                                    🕒 ${unlockTime.getHours().toString().padStart(2, '0')}:${unlockTime.getMinutes().toString().padStart(2, '0')}
                                </span>
                                ${isCompleted ? 
                                    '<span class="text-xs font-bold text-green-500 bg-green-50 px-2 py-1 rounded-full">✅ 完成</span>' : 
                                    '<span class="text-xs font-bold text-blue-600 animate-pulse">🔥 進行中</span>'
                                }
                            </div>
                            
                            <h3 class="text-md font-bold text-gray-800 mb-2">${displayQuestion}</h3>
                    `;

                    if (isCompleted) {
                        html += `
                            <div class="bg-blue-50 rounded-lg p-4 mt-3 border border-blue-100">
                                <p class="text-sm text-blue-700 font-bold">${task.successMsg}</p>
                            </div>
                        `;
                        
                        if (task.type === 'photo' && photoCache[task.id]) {
                            html += `
                            <div class="mt-3">
                                <img src="${photoCache[task.id]}" class="w-full rounded-lg shadow-sm border border-gray-200 object-cover max-h-48">
                            </div>`;
                        }
                        
                        html += `
                            <div class="mt-4 text-center">
                                <span class="barcode text-gray-300">||| ||||| || ||||||</span>
                            </div>
                        `;
                    } else {
                        if (task.type === 'text') {
                            html += `
                                <div class="mt-3 space-y-2">
                                    <input type="text" id="input_${task.id}" placeholder="答案係..." 
                                           class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600">
                                    <p id="error_${task.id}" class="text-xs text-red-500 hidden font-bold">❌ 答案唔啱喎，再諗諗~</p>
                                    <button onclick="checkTextAnswer('${task.id}', '${task.answer}')" 
                                            class="w-full bg-blue-600 text-white font-bold rounded-lg p-3 text-sm shadow-md hover:bg-blue-700 active:scale-95 transition-transform">
                                        提交答案
                                    </button>
                                    <p class="text-xs text-center text-gray-400 mt-2">提提你：你得一個鐘時間作答~</p>
                                </div>
                            `;
                        } else if (task.type === 'button') {
                            html += `
                                <div class="mt-3 space-y-2">
                                    <button onclick="checkButtonTask('${task.id}')" 
                                            class="w-full bg-green-600 text-white font-bold rounded-lg p-3 text-sm shadow-md hover:bg-green-700 active:scale-95 transition-transform">
                                        👆 撳我完成任務
                                    </button>
                                    <p class="text-xs text-center text-gray-400 mt-2">提提你：完成任務請撳掣~</p>
                                </div>
                            `;
                        } else if (task.type === 'photo') {
                            html += `
                                <div class="mt-3 space-y-2">
                                    <label class="cursor-pointer w-full flex items-center justify-center bg-purple-600 text-white font-bold rounded-lg p-3 text-sm shadow-md hover:bg-purple-700 active:scale-95 transition-transform">
                                        📸 影相打卡
                                        <input type="file" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoUpload('${task.id}', this)">
                                    </label>
                                    <p class="text-xs text-center text-gray-400 mt-2">提提你：上傳靚相解鎖任務~</p>
                                </div>
                            `;
                        }
                    }

                    html += `</div>`;
                }
            });

            taskContainer.innerHTML = html;
        }

        // 每秒更新倒數計時
        function updateCountdowns() {
            const now = getCurrentTime();
            const elements = document.querySelectorAll('.countdown-text');
            let needsFullRender = false;

            elements.forEach(el => {
                const target = new Date(el.getAttribute('data-target'));
                if (now >= target) {
                    needsFullRender = true; 
                } else {
                    el.textContent = getCountdownString(target, now);
                }
            });
            
            // 檢查目的地是否需要解鎖
            const TRIP_START_TIME = new Date(travelData[0].tasks[0].unlockTime);
            const destBlock = document.getElementById('flight-dest');
            if (destBlock && destBlock.classList.contains('blur-md') && now >= TRIP_START_TIME) {
                needsFullRender = true;
            }

            travelData.forEach(day => {
                day.tasks.forEach(task => {
                    const autoCompleteTime = new Date(new Date(task.unlockTime).getTime() + 60 * 60 * 1000);
                    const isManualCompleted = localStorage.getItem(`completed_${task.id}`) === "true";
                    if (now >= autoCompleteTime && now - autoCompleteTime < 2000 && !isManualCompleted) {
                         needsFullRender = true;
                    }
                });
            });

            if (needsFullRender) renderTasks();
        }

        // 啟動應用程式
        initApp();

        // --- 測試模式邏輯 ---
        const testModeContainer = document.getElementById('test-mode-container');
        const testBtn = document.getElementById('test-mode-btn');
        const testModal = document.getElementById('test-modal');
        const closeTestBtn = document.getElementById('close-test-btn');
        const resetTimeBtn = document.getElementById('reset-time-btn');
        const mockTimeInput = document.getElementById('mock-time-input');

        if (!ENABLE_TEST_MODE) {
            testModeContainer.classList.add('hidden');
        }

        const nowLocal = new Date();
        nowLocal.setMinutes(nowLocal.getMinutes() - nowLocal.getTimezoneOffset());
        mockTimeInput.value = nowLocal.toISOString().slice(0,16);

        testBtn.addEventListener('click', () => {
            testModal.classList.remove('hidden');
        });

        closeTestBtn.addEventListener('click', () => {
            if (mockTimeInput.value) {
                mockDate = new Date(mockTimeInput.value);
            }
            testModal.classList.add('hidden');
            renderTasks();
        });

        resetTimeBtn.addEventListener('click', () => {
            mockDate = null;
            testModal.classList.add('hidden');
            renderTasks();
        });

    </script>
</body>
</html>
